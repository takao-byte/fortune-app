<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フォーチュンアプリ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, #0f1021, #2b1055 45%, #7597de);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .sub {
      font-size: 14px;
      letter-spacing: 0.08em;
      color: #d7d9ff;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 36px;
      line-height: 1.2;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 14px 16px;
      border: none;
      outline: none;
      border-radius: 14px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.92);
      color: #222;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #ff4d8d, #7b61ff);
      transition: transform 0.15s ease, opacity 0.15s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .result-box {
      min-height: 140px;
      border-radius: 18px;
      padding: 24px 18px;
      background: rgba(255, 255, 255, 0.10);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .fortune-label {
      font-size: 14px;
      color: #d6d8ff;
      margin-bottom: 12px;
    }

    .fortune-main {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255,255,255,0.25);
    }

    .fortune-text {
      font-size: 18px;
      line-height: 1.8;
      color: #f5f6ff;
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: #c9cbff;
      opacity: 0.9;
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 30px;
      }

      .input-area {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .fortune-main {
        font-size: 34px;
      }

      .fortune-text {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="sub">YOUR DAILY FORTUNE</div>
    <h1>今日の運勢 🔮</h1>

    <div class="input-area">
      <input id="name" type="text" placeholder="名前を入力してください" onkeydown="handleEnter(event)">
      <button onclick="fortune()">占う</button>
    </div>

    <div class="result-box">
      <div class="fortune-label">結果</div>
      <div class="fortune-main" id="fortuneMain">---</div>
      <div class="fortune-text" id="result">名前を入れて占ってみてください。</div>
    </div>

    <div class="hint">Enterキーでも占えます</div>
  </div>

  <script>
    function fortune() {
      const fortunes = [
        { title: "大吉", message: "最高の日。思いついたことは、今日やる価値があります。" },
        { title: "中吉", message: "かなり良い流れ。焦らず進めばちゃんと形になります。" },
        { title: "小吉", message: "小さく前進する日。派手さより積み重ねが効きます。" },
        { title: "吉", message: "安定した運気。迷ったら無難より“少し好き”を選ぶと良いです。" },
        { title: "末吉", message: "伸びしろのある日。今の行動があとで効いてきます。" },
        { title: "凶", message: "無理は禁物。今日は守りを固めるほうが結果的に勝ちです。" }
      ];

      const name = document.getElementById("name").value.trim();

      if (name === "") {
        alert("名前を入力してください");
        return;
      }

      const rand = Math.floor(Math.random() * fortunes.length);
      const result = fortunes[rand];

      document.getElementById("fortuneMain").innerText = result.title;
      document.getElementById("result").innerText =
        name + "さんの今日の運勢は「" + result.title + "」。" + result.message;
    }

    function handleEnter(event) {
      if (event.key === "Enter") {
        fortune();
      }
    }
  </script>
</body>
</html>
