<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フォーチュンアプリ</title>
</head>
<body>
  <h1>今日の運勢</h1>

  <input id="name" placeholder="名前を入力してください">
  <button onclick="fortune()">占う</button>

  <p id="result"></p>

  <script>
    function fortune() {
      const fortunes = ["大吉", "中吉", "小吉", "吉", "末吉", "凶"];
      const name = document.getElementById("name").value;

      if (name === "") {
        alert("名前を入力してください");
        return;
      }

      const rand = Math.floor(Math.random() * fortunes.length);
      document.getElementById("result").innerText =
        name + "さんの今日の運勢は " + fortunes[rand] + " です。";
    }
  </script>
</body>
</html>
